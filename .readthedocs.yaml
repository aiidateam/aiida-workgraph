version: 2

build:
  os: ubuntu-24.04
  apt_packages:
  - graphviz
  tools:
    python: '3.12'
    nodejs: '20'
  jobs:
    post_install:
    # TEMPORARY (issue #786): the executed docs examples use aiida-core's ZMQ
    # broker, so the build needs no RabbitMQ/PostgreSQL. That requires aiida-core
    # 2.9 (unreleased -> main) and aiida-shell with #116 (unreleased -> master);
    # both are scoped to the docs build only, so CI and local dev keep the
    # released pins. node-graph comes from [tool.uv.sources] via `uv sync`.
    # Drop these (and the uv source) and bump the version pins once aiida-core
    # 2.9, aiida-shell, and node-graph 0.6.6 are released.
    - uv pip install "aiida-core @ git+https://github.com/aiidateam/aiida-core.git@main" "aiida-shell @ git+https://github.com/aiidateam/aiida-shell.git@master" importlib-metadata
    # `presto --use-zmq` creates an SQLite profile with the ZMQ broker, configures
    # localhost as a computer, and starts the daemon (needed by submit examples).
    - verdi presto --use-zmq
    - verdi config set logging.aiida_loglevel ERROR
    - verdi code create core.code.installed --label add --computer=localhost --default-calc-job-plugin core.arithmetic.add --filepath-executable=/bin/bash -n

python:
  install:
  - method: uv
    command: sync
    path: .
    extras:
    - docs

# Build from the docs/ directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
